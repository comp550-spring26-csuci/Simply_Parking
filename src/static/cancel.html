<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Cancelled — Simply Parking</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f6f9fc;
            color: #32325d;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 7px 14px 0 rgba(60, 66, 87, 0.10),
                        0 3px 6px 0 rgba(0, 0, 0, 0.07);
            padding: 56px 48px 40px;
            max-width: 480px;
            width: 100%;
            text-align: center;
        }
        .x-circle {
            width: 72px;
            height: 72px;
            background: #fff1f0;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 28px;
        }
        .x-circle svg {
            width: 36px;
            height: 36px;
            color: #df1b41;
        }
        h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 12px;
            color: #1a1f36;
        }
        .subtitle {
            color: #525f7f;
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 6px;
        }
        .return-msg {
            color: #6b7c93;
            font-size: 14px;
            margin-top: 4px;
        }
        .footer {
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid #e3e8ee;
            font-size: 12px;
            color: #8898aa;
        }
        .footer a {
            color: #635bff;
            text-decoration: none;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="x-circle">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
        </div>
        <h1>Payment cancelled</h1>
        <p class="subtitle">No charge was made.</p>
        <p class="return-msg">You can close this window and return to the Simply Parking app.</p>
        <div class="footer">
            Powered by <a href="https://stripe.com">stripe</a>
        </div>
    </div>
</body>
</html>
